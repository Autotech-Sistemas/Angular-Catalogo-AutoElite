<section class="stories-section" aria-label="Depoimentos de clientes">
  <div class="stories-wrap">
    <header class="stories-header" data-aos="fade-up">
      <h2>Historias reais, experiencias <span class="title-accent">reais</span></h2>
      <p>Veja como ajudamos clientes a comprar, trocar e financiar com confianca.</p>
    </header>

    <div class="stories-layout" data-aos="fade-up" data-aos-delay="100">
      <article class="stories-copy">
        <div class="quote-shell">
          <svg class="quote-icon quote-open" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 13H6a4 4 0 0 1 4-4V5a8 8 0 0 0-8 8v6h8z"></path>
            <path d="M22 13h-4a4 4 0 0 1 4-4V5a8 8 0 0 0-8 8v6h8z"></path>
          </svg>
          <p class="stories-quote">{{ current.quote }}</p>
          <svg class="quote-icon quote-close" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 13H6a4 4 0 0 1 4-4V5a8 8 0 0 0-8 8v6h8z"></path>
            <path d="M22 13h-4a4 4 0 0 1 4-4V5a8 8 0 0 0-8 8v6h8z"></path>
          </svg>
        </div>

        <div class="stories-meta">
          <div>
            <h3>{{ current.name }}</h3>
            <p>{{ current.role }}</p>
          </div>
          <div class="stories-location">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 22s8-7.2 8-13a8 8 0 1 0-16 0c0 5.8 8 13 8 13Z"></path>
              <circle cx="12" cy="9" r="2.5"></circle>
            </svg>
            <span>{{ current.location }}</span>
          </div>
        </div>

        <div class="stories-controls">
          <button type="button" class="ctrl main" (click)="prev()" aria-label="Anterior">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
          </button>
          <button type="button" class="ctrl" (click)="next()" aria-label="Proximo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
          </button>

          <div class="dots">
            <button
              *ngFor="let item of testimonials; let i = index"
              type="button"
              [class.active]="i === activeIndex"
              (click)="goTo(i)"
              [attr.aria-label]="'Depoimento ' + (i + 1)"
            ></button>
          </div>
        </div>
      </article>

      <aside class="stories-media">
        <img [src]="current.image" [alt]="current.name" />
        <button type="button" class="play-btn" aria-label="Play depoimento">
          <span></span>
        </button>
      </aside>
    </div>
  </div>
</section>
