<header
  class="fixed w-full z-50 transition-all duration-300 border-b"
  role="banner"
  [ngClass]="{
    'bg-white/95 backdrop-blur-md shadow-sm py-2 border-gray-100': isScrolled,
    'bg-transparent py-6 border-transparent': !isScrolled,
  }"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-12">

      <!-- Logo -->
      <a
        href="#highlight"
        class="flex-shrink-0 flex items-center gap-2 cursor-pointer"
        (click)="scrollToTop($event)"
        aria-label="AutoCatalogo – Ir para o início da página"
        title="AutoCatalogo – Início"
      >
        <img
          src="logo.png"
          alt="AutoCatalogo – Veículos Seminovos"
          width="120"
          height="40"
          loading="eager"
          fetchpriority="high"
        />
      </a>

      <!-- Skip Navigation Link (acessibilidade: permite pular para conteúdo principal) -->
      <a
        href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:bg-red-600 focus:text-white focus:rounded-md focus:font-bold focus:shadow-lg"
      >
        Pular para o conteúdo principal
      </a>

      <!-- Desktop Menu -->
      <nav
        class="hidden lg:block"
        aria-label="Navegação principal"
        role="navigation"
      >
        <ul class="ml-10 flex items-center space-x-1 list-none" role="list">
          <li *ngFor="let item of menuItems" role="listitem">
            <a
              [attr.href]="'#' + item.id"
              (click)="scrollToSection($event, item.id)"
              class="px-4 py-2 text-sm font-bold rounded-full transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2"
              [ngClass]="
                isScrolled
                  ? 'text-gray-700 hover:text-red-500 hover:bg-red-50'
                  : 'text-white/90 hover:text-white hover:bg-white/10'
              ">
              {{ item.label }}
            </a>
          </li>

          <li role="listitem">
            <a
              href="#test-drive"
              (click)="scrollToSection($event, 'test-drive')"
              class="ml-2 px-6 py-2.5 rounded-full transition-all shadow-lg font-bold text-sm transform hover:-translate-y-0.5 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2"
              [ngClass]="
                isScrolled
                  ? 'bg-gray-900 hover:bg-red-500 text-white hover:shadow-red-500/30'
                  : 'bg-white text-gray-900 hover:bg-red-500 hover:text-white border border-transparent'
              "
              aria-label="Avaliar meu carro – Ir para o formulário de avaliação"
            >
              Avaliar meu Carro
            </a>
          </li>

          <li role="listitem">
            <button
              type="button"
              (click)="toggleTheme()"
              class="ml-2 w-10 h-10 rounded-full border flex items-center justify-center transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2"
              [ngClass]="
                isScrolled
                  ? 'bg-white border-gray-300 text-gray-700 hover:text-amber-600'
                  : 'bg-white/10 border-white/30 text-white hover:bg-white/20'
              "
              [attr.aria-label]="theme === 'light' ? 'Ativar modo escuro' : 'Ativar modo claro'"
              [attr.aria-pressed]="theme === 'dark'"
              [title]="theme === 'light' ? 'Ativar modo escuro' : 'Ativar modo claro'"
            >
              <ng-container *ngIf="theme === 'light'">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9z" />
                </svg>
                <span class="sr-only">Ativar modo escuro</span>
              </ng-container>

              <ng-container *ngIf="theme === 'dark'">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <circle cx="12" cy="12" r="4" />
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
                </svg>
                <span class="sr-only">Ativar modo claro</span>
              </ng-container>
            </button>
          </li>
        </ul>
      </nav>

      <!-- Mobile Menu Button -->
      <div class="lg:hidden flex items-center gap-2">
        <button
          type="button"
          (click)="toggleTheme()"
          class="w-10 h-10 rounded-full border flex items-center justify-center transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500"
          [ngClass]="
            isScrolled || isMobileMenuOpen
              ? 'bg-white border-gray-300 text-gray-700'
              : 'bg-white/10 border-white/30 text-white'
          "
          [attr.aria-label]="theme === 'light' ? 'Ativar modo escuro' : 'Ativar modo claro'"
          [attr.aria-pressed]="theme === 'dark'"
        >
          <ng-container *ngIf="theme === 'light'">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9z" />
            </svg>
            <span class="sr-only">Ativar modo escuro</span>
          </ng-container>
          <ng-container *ngIf="theme === 'dark'">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
            </svg>
            <span class="sr-only">Ativar modo claro</span>
          </ng-container>
        </button>

        <button
          (click)="toggleMobileMenu()"
          class="p-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 rounded-md transition-colors"
          [ngClass]="
            isScrolled || isMobileMenuOpen
              ? 'text-gray-900 hover:text-red-500'
              : 'text-white hover:text-red-400'
          "
          [attr.aria-label]="isMobileMenuOpen ? 'Fechar menu de navegação' : 'Abrir menu de navegação'"
          [attr.aria-expanded]="isMobileMenuOpen"
          aria-controls="mobile-menu"
          type="button"
        >
          <ng-container *ngIf="!isMobileMenuOpen">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true" focusable="false">
              <line x1="4" x2="20" y1="12" y2="12" />
              <line x1="4" x2="20" y1="6" y2="6" />
              <line x1="4" x2="20" y1="18" y2="18" />
            </svg>
          </ng-container>
          <ng-container *ngIf="isMobileMenuOpen">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </ng-container>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <nav
    id="mobile-menu"
    class="lg:hidden bg-white/95 backdrop-blur-xl border-t border-gray-100 shadow-2xl absolute w-full transition-all duration-300 origin-top overflow-hidden"
    [class.max-h-0]="!isMobileMenuOpen"
    [class.max-h-screen]="isMobileMenuOpen"
    [class.opacity-0]="!isMobileMenuOpen"
    [class.opacity-100]="isMobileMenuOpen"
    [attr.aria-hidden]="!isMobileMenuOpen"
    [attr.inert]="!isMobileMenuOpen ? '' : null"
    aria-label="Menu de navegação móvel"
    role="navigation"
  >
    <div class="px-4 pt-6 pb-8">
      <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4" aria-hidden="true">
        Navegação
      </p>

      <ul class="grid grid-cols-2 gap-3 list-none" role="list">
        <li *ngFor="let item of menuItems" role="listitem">
          <a
            [attr.href]="'#' + item.id"
            (click)="scrollToSection($event, item.id)"
            class="flex flex-col items-center justify-center aspect-[4/3] bg-gray-50 hover:bg-red-50 rounded-2xl border border-gray-100 hover:border-red-100 transition-all group active:scale-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-inset">
            <div
              class="w-10 h-10 mb-2 rounded-full bg-white flex items-center justify-center shadow-sm text-gray-400 group-hover:text-red-500 group-hover:scale-110 transition-all"
              aria-hidden="true"
            >
              <ng-container [ngSwitch]="item.icon">
                <svg *ngSwitchCase="'home'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                  <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <svg *ngSwitchCase="'grid'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <rect width="7" height="7" x="3" y="3" rx="1" />
                  <rect width="7" height="7" x="14" y="3" rx="1" />
                  <rect width="7" height="7" x="14" y="14" rx="1" />
                  <rect width="7" height="7" x="3" y="14" rx="1" />
                </svg>
                <svg *ngSwitchCase="'car'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
                  <circle cx="7" cy="17" r="2" />
                  <circle cx="17" cy="17" r="2" />
                </svg>
                <svg *ngSwitchCase="'dollar'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <line x1="12" x2="12" y1="2" y2="22" />
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
              </ng-container>
            </div>
            <span class="text-sm font-bold text-gray-600 group-hover:text-red-600">
              {{ item.label }}
            </span>
          </a>
        </li>
      </ul>

      <a
        href="#test-drive"
        (click)="scrollToSection($event, 'test-drive')"
        class="w-full mt-4 bg-gray-900 text-white flex items-center justify-center gap-2 py-4 rounded-xl text-base font-bold shadow-lg active:scale-95 transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2"
        aria-label="Avaliar meu carro – Ir para o formulário de avaliação"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="8.5" cy="7" r="4" />
          <line x1="23" x2="17" y1="11" y2="11" />
        </svg>
        Avaliar meu Carro
      </a>
    </div>
  </nav>
</header>
