<section id="faq" class="faq-section" aria-labelledby="faq-title">
  <div class="faq-wrap">
    <div class="faq-grid" data-aos="fade-up">
      <article class="faq-list">
        <button
          *ngFor="let item of faqs; let i = index"
          type="button"
          class="faq-item"
          [class.active]="i === activeIndex"
          (click)="setActive(i)"
        >
          <div class="faq-item-top">
            <h3>{{ item.question }}</h3>
            <span class="faq-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="m7 17 10-10"></path>
                <path d="M8 7h9v9"></path>
              </svg>
            </span>
          </div>
          <p *ngIf="i === activeIndex">{{ item.answer }}</p>
        </button>
      </article>

      <aside class="faq-side">
        <h2 id="faq-title">Duvidas <span>FAQ Respondido</span></h2>
        <p>Tire suas perguntas sobre compra, troca, avaliacao e financiamento com nossa equipe.</p>

        <a href="#test-drive" class="faq-cta">Ver FAQ completo</a>

        <div class="faq-contact">
          <div class="faq-people" aria-hidden="true"><span></span><span></span><span></span></div>
          <div>
            <strong>Precisa de ajuda agora?</strong>
            <p>Fale com um consultor AutoCatalogo e receba atendimento imediato.</p>
          </div>
          <a href="#test-drive" class="faq-talk">Quero falar agora</a>
        </div>
      </aside>
    </div>
  </div>
</section>
