<section id="showroom" class="stock-section py-20">
  <div class="stock-wrap">
    <div class="text-center mb-10">
      <span class="stock-kicker">Catálogo Exclusivo</span>
      <h2 class="text-4xl md:text-5xl font-black tracking-tight mt-4 mb-3">
        Estoque em <span class="title-accent">destaque</span>
      </h2>
      <p class="text-base md:text-lg">Confira as melhores ofertas para você.</p>
    </div>

    <div class="stock-carousel-container">
      <button type="button" class="nav-btn prev" (click)="swipePrev()" aria-label="Anterior">
        <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
      </button>

      <swiper-container #swiperRef init="false" class="stock-swiper" pagination="true">
        <swiper-slide *ngFor="let car of cards; let i = index">
          <article class="vehicle-card">
            
            <div class="card-media-wrapper" [style.background]="car.heroBg">
              <div class="card-media">
                <img [src]="car.imageSrc" [alt]="car.model" loading="lazy" class="vehicle-image" />
              </div>
            </div>

            <div class="card-body">
              <div class="card-header-info">
                <p class="card-brand">{{ car.brand }}</p>
                <h3 class="card-model-name">{{ car.model }}</h3>
                <p class="card-version-year">{{ car.trim }} • {{ car.year }}</p>
              </div>

              <div class="price-section">
                <span class="label">À VISTA POR</span>
                <strong class="price-value">{{ car.price }}</strong>
              </div>

              <button class="card-cta">Mais Detalhes</button>
            </div>

          </article>
        </swiper-slide>
      </swiper-container>

      <button type="button" class="nav-btn next" (click)="swipeNext()" aria-label="Próximo">
        <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
      </button>
    </div>
  </div>
</section>
